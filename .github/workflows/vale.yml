name: Vale

on:
  pull_request:
    branches: [main]
    paths:
      - "**.md"
      - "**.mdx"
      - ".vale/**"
      - ".vale.ini"

jobs:
  vale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: errata-ai/vale-action@v2
        with:
          files: "apps/docs/stories"
          reporter: github-check
          fail_on_error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
